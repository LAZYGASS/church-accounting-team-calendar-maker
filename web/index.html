<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재정집행일정 캘린더</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>재정집행일정 캘린더</h1>
            <div class="controls">
                <label for="year-select">연도:</label>
                <select id="year-select">
                    <option value="2026" selected>2026</option>
                    <option value="2027">2027</option>
                    <option value="2028">2028</option>
                </select>
                <button id="generate-btn">생성</button>
            </div>
        </header>

        <div id="calendars-container"></div>
    </div>

    <!-- 운영위원회 날짜 수정 모달 -->
    <div id="committee-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>운영위원회 날짜 수정</h2>
                <span class="close" onclick="closeCommitteeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="modal-title">
                    <span id="committee-modal-title"></span>
                    <span id="auto-date" class="auto-date-info"></span>
                </div>
                <label for="committee-date-input">날짜:</label>
                <input type="number" id="committee-date-input" min="1" max="31" placeholder="예: 15">
                <div class="modal-help">
                    <p>월의 날짜를 입력하세요 (1~31).</p>
                    <p>비워두면 자동 계산된 날짜가 사용됩니다.</p>
                </div>
            </div>
            <div class="modal-footer">
                <button id="committee-reset-btn" class="btn-reset">초기화</button>
                <div>
                    <button class="btn-cancel" onclick="closeCommitteeModal()">취소</button>
                    <button id="committee-save-btn" class="btn-save">저장</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="js/calendar.js"></script>
</body>

</html>
